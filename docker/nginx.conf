# nginx — presentation tier for the Ticket Tracker (ADR-0009).
# Serves the compiled Vite SPA and reverse-proxies the API. Same-origin, no CORS.

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Reasonable static-asset caching for hashed Vite build output.
    location /assets/ {
        try_files $uri =404;
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy (ADR-0009 §3, §5): ALWAYS proxy /api/* to the backend
    # with the path PRESERVED (no strip, no rewrite). proxy_pass has no URI
    # component, so nginx forwards the original request URI unchanged.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing fallback (ADR-0009 §2): unknown non-/api paths
    # return index.html so React Router can resolve them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
